site_name: Relay
site_description: Production-grade multi-provider LLM client. One YAML, one interface, every model.
site_url: https://relay.ai5labs.com
repo_url: https://github.com/ai5labs/relay-llm
repo_name: ai5labs/relay-llm
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            members_order: source
            docstring_style: google

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts:
    - YAML config: concepts/config.md
    - Providers: concepts/providers.md
    - Pricing &amp; cost tracking: concepts/pricing.md
    - Routing &amp; failover: concepts/routing.md
  - Features:
    - Streaming: features/streaming.md
    - Tool calling: features/tools.md
    - Structured output: features/structured.md
    - MCP integration: features/mcp.md
    - Caching: features/caching.md
    - Reasoning budgets: features/reasoning.md
    - Batch API: features/batch.md
  - Production:
    - Observability (OTel): production/observability.md
    - PII redaction: production/redaction.md
    - Audit logging: production/audit.md
    - Guardrails: production/guardrails.md
    - Security: production/security.md
  - API reference:
    - relay: api/relay.md
    - relay.config: api/config.md
    - relay.tools: api/tools.md
    - relay.structured: api/structured.md
    - relay.mcp: api/mcp.md
    - relay.cache: api/cache.md
  - Contributing: contributing.md
