name: Contract tests (live providers)

on:
  schedule:
    - cron: "0 6 * * *"   # nightly at 06:00 UTC
  workflow_dispatch:        # manual trigger

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    if: github.repository == 'ai5labs/relay-llm'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-groups
      - name: Run contract tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: uv run pytest tests/contract/ -m live -v --tb=short
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Contract tests failed (${context.runId})`,
              body: `Nightly contract tests failed. Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['contract-failure']
            });
