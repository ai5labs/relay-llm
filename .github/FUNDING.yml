# GitHub Sponsors button config.
# Each entry surfaces a "Sponsor" button at the top of the repo.
# Uncomment lines as you activate each platform. Anything left commented out
# is hidden — GitHub never errors on missing-but-unconfigured channels.

# --- The plan: global-first, with India-native UPI as a bonus channel ---
#
# ai5labs Research OPC Pvt Ltd is incorporated in India. Stripe is invite-
# only in India since May 2024. The truly-global OSS-funding path is:
# Open Source Collective (OSC) as fiscal host, plus PayPal Business for
# direct cards, plus Liberapay for fee-free recurring.

# --- Tier 1: truly global ---

# Open Collective with Open Source Collective as the fiscal host. OSC is
# the canonical fiscal host for ~2,500 OSS projects worldwide. Solves the
# Stripe-in-region problem because OSC handles all payments and you receive
# USD via expense reports.
# Apply: https://www.oscollective.org → become a collective → OSC reviews
# (1-2 weeks). Once approved, you can link OSC to GitHub Sponsors so the
# repo Sponsor button works globally.
# open_collective: relay-llm

# GitHub Sponsors — once OSC fiscal hosting is approved, link OSC as your
# org's payout method. Until then leave the line commented to avoid
# routing donors at a profile that can't actually receive funds.
# github: [ai5labs]

# PayPal Business — accept from 200+ countries, auto-deposits to your
# Indian bank account daily. Lowest friction global option. ~3-5% fees.
# Set up at https://www.paypal.com/in → register the Pvt Ltd → link bank.
# Then create a payment page and add the URL here:
# custom:
#   - "https://www.paypal.com/donate/?business=..."

# Liberapay — 0% platform fee, only payment-processor fees. Globally
# accessible. Capped at €100/donor/week.
# Create at https://liberapay.com → register the ai5labs team profile.
# liberapay: ai5labs

# --- Tier 2: India-native bonus channel ---

# Razorpay Pages — captures Indian donors via UPI (basically free for them).
# Useful as a complement to the global stack rather than the primary path.
# Create at https://razorpay.com → Pages → New Page → tiers
# custom:
#   - "https://pages.razorpay.com/ai5labs-relay"

# --- Tier 3: defer ---

# Polar.sh — OSS-native, but built on Stripe Connect with India payout
# unconfirmed. Re-evaluate when payouts to India are formally announced.
# polar: ai5labs

# Buy Me a Coffee / Ko-fi — casual one-offs. Lower prestige.
# custom:
#   - "https://www.buymeacoffee.com/ai5labs"

# Crypto wallet addresses — large accounting overhead for an Indian
# Pvt Ltd: 30% flat tax on gains, Schedule III balance-sheet disclosure,
# banks intermittently refuse settlement. Re-evaluate above ~$50k/year.
# custom:
#   - "bitcoin:bc1q..."

# --- Tier 4: enterprise sponsorships (not click-to-donate) ---
# Direct invoiced sponsorships ($2.5k+/month, logo on README, roadmap input)
# are handled via SUPPORT.md → engineering@ai5labs.com.
