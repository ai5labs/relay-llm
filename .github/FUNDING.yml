# GitHub Sponsors button config.
# Each entry surfaces a "Sponsor" button at the top of the repo.
# Uncomment lines as you activate each platform. Anything left commented out
# is hidden — GitHub never errors on missing-but-unconfigured channels.

# --- Tier 1: prestige + recurring ---

# GitHub Sponsors — apply at https://github.com/sponsors as the ai5labs org
# admin. Approval takes ~7-14 days. Once approved, the Sponsor button on the
# repo header lands sponsors directly on this profile.
github: [ai5labs]

# --- Tier 2: easy + India-native ---

# Razorpay Pages — fastest path for an Indian Pvt Ltd. Same-day onboarding.
# Native UPI support (near-zero fee for Indian donors), cards, netbanking.
# Create at: https://razorpay.com → Pages → new page → tiers
# Replace this URL after creating the page:
# custom:
#   - "https://pages.razorpay.com/ai5labs-relay"

# --- Tier 3: defer until needed ---

# Polar.sh — issue-funding + monthly support. Sign up at https://polar.sh
# polar: ai5labs

# Open Collective — public ledger. Bureaucratic for a registered Pvt Ltd
# but appealing to enterprise donors who want full transparency.
# Create at: https://opencollective.com/create
# open_collective: relay-llm

# Buy Me a Coffee / Ko-fi — for casual one-off donations.
# Set up at https://buymeacoffee.com (or ko-fi.com)
# custom:
#   - "https://www.buymeacoffee.com/ai5labs"

# Crypto wallet addresses — possible but creates accounting overhead for
# an Indian Pvt Ltd (30% flat tax on crypto gains, Schedule III balance
# sheet disclosure). Defer until donation volume justifies the CA cost.
# custom:
#   - "bitcoin:bc1q..."
#   - "https://etherscan.io/address/0x..."

# --- Note ---
# We removed the ai5labs.com/relay-llm/sponsor + /enterprise URLs because
# those pages don't exist yet. Re-add them under `custom:` once they do.
