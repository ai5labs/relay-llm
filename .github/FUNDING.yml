# GitHub Sponsors button config.
# Each entry surfaces a "Sponsor" button at the top of the repo.
# Uncomment lines as you activate each platform. Anything left commented out
# is hidden — GitHub never errors on missing-but-unconfigured channels.

# --- Context: ai5labs Research OPC Pvt Ltd is an Indian Pvt Ltd. Stripe
# became invite-only in India (May 2024), which affects payout availability
# on Stripe-backed platforms (GitHub Sponsors, Polar, Liberapay-via-Stripe).
# The donation stack is structured around that reality.

# --- Tier 1: live first — global + India-native ---

# Razorpay Pages — primary donation channel. Same-day onboarding for Indian
# Pvt Ltd. Native UPI for Indian donors (near-zero fee), cards/netbanking
# for global donors. Settles to INR current account. ~2% all-in.
# Create at: https://razorpay.com → Pages → New Page → set tiers
# Replace this URL once the page is live, then move it under `custom:`:
# custom:
#   - "https://pages.razorpay.com/ai5labs-relay"

# Liberapay — 0% platform fees, only payment-processor fees. Globally
# accessible. Capped at €100/donor/week, fine for OSS donations.
# Create at: https://liberapay.com → register as the ai5labs team
# liberapay: ai5labs

# --- Tier 2: prestige (apply now, lights up later) ---

# GitHub Sponsors — the famous Sponsor-button channel. Apply as the ai5labs
# org. Because Stripe is invite-only in India, GitHub Sponsors may route
# Indian payouts through Open Source Collective as a fiscal host. Plan for
# 2-4 weeks of approval time, not 7-14 days.
github: [ai5labs]

# --- Tier 3: defer until volume justifies setup ---

# Polar.sh — OSS-native (issue funding + tiers). Built on Stripe Connect;
# India payout availability not yet confirmed publicly. Try after the Tier 1
# stack is generating real volume.
# polar: ai5labs

# Open Collective — public ledger. As an incorporated Pvt Ltd you can
# participate via the Open Source Collective fiscal host. More overhead
# than it's worth at small donation volumes.
# open_collective: relay-llm

# Buy Me a Coffee / Ko-fi — casual one-off donations. Lower prestige
# signal but very low friction for casual donors.
# custom:
#   - "https://www.buymeacoffee.com/ai5labs"

# Crypto wallet addresses — possible but creates large accounting
# overhead for an Indian Pvt Ltd: 30% flat tax on gains, Schedule III
# balance-sheet disclosure, banks intermittently refuse settlement.
# Re-evaluate when annual donations cross ~$50k.
# custom:
#   - "bitcoin:bc1q..."
#   - "https://etherscan.io/address/0x..."

# --- Tier 4: enterprise sponsorships (separate sales motion) ---

# For enterprise sponsorships ($2.5k+/month, logo on README + roadmap input),
# we list a contact email in SUPPORT.md rather than a self-serve form.
# Direct INR or USD wire transfers, invoiced.
